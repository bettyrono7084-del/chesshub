<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Football Chess | Alexander Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: #0a2f1f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }
    .canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
      border-radius: 0;
      overflow: hidden;
      background: #1a3b2b;
    }
    canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
  </style>
</head>
<body>
<div class="canvas-container">
  <canvas id="chessCanvas" width="1366" height="768"></canvas>
</div>
<script>
(function(){
  const canvas = document.getElementById('chessCanvas');
  const ctx    = canvas.getContext('2d');

  // Leave enough room: 14px frame above, rank labels on left (30px),
  // 28px below board for the bottom rank numbers row, plus frame below
  const boardSize = 640;
  const cellSize  = boardSize / 8;            // 80px
  const offsetX   = (1366 - boardSize) / 2;  // centred
  const offsetY   = (768  - boardSize) / 2 - 20; // shift up a bit so bottom row is visible

  function makeGrassTile(dark) {
    const pc = document.createElement('canvas');
    pc.width = 10; pc.height = 8;
    const g  = pc.getContext('2d');
    if (dark) {
      g.fillStyle = '#1b5e20'; g.fillRect(0,0,10,8);
      g.fillStyle = '#2e7d32'; g.fillRect(0,0,10,4);
      g.strokeStyle = 'rgba(61,139,65,0.5)'; g.lineWidth = 0.5;
    } else {
      g.fillStyle = '#43a047'; g.fillRect(0,0,10,8);
      g.fillStyle = '#4caf50'; g.fillRect(0,0,10,4);
      g.strokeStyle = 'rgba(93,191,98,0.5)'; g.lineWidth = 0.5;
    }
    g.beginPath(); g.moveTo(0,0); g.lineTo(10,0); g.stroke();
    return ctx.createPattern(pc, 'repeat');
  }
  const grassLight = makeGrassTile(false);
  const grassDark  = makeGrassTile(true);

  let board = Array(8).fill(null).map(() => Array(8).fill(null));

  function initBoard() {
    for (let r=0; r<8; r++) for (let c=0; c<8; c++) board[r][c]=null;
    for (let c=0; c<8; c++) { board[1][c]='p'; board[6][c]='P'; }
    ['r','n','b','q','k','b','n','r'].forEach((p,c)=>{ board[0][c]=p; board[7][c]=p.toUpperCase(); });
  }

  function isWhite(piece) {
    if (!piece) return null;
    return piece === piece.toUpperCase() && piece !== piece.toLowerCase();
  }

  function isValidPieceMove(piece, fx, fy, tx, ty, bs) {
    const dx=tx-fx, dy=ty-fy, adx=Math.abs(dx), ady=Math.abs(dy);
    const target=bs[ty][tx];
    if (target && isWhite(target)===isWhite(piece)) return false;
    const t=piece.toLowerCase(), dir=isWhite(piece)?-1:1;
    if (t==='p') {
      if (dx===0&&dy===dir&&!target) return true;
      if (dx===0&&dy===2*dir&&!target) { const sr=isWhite(piece)?6:1; if(fy===sr&&!bs[fy+dir][fx]) return true; }
      if (adx===1&&dy===dir&&target&&isWhite(target)!==isWhite(piece)) return true;
      return false;
    }
    if (t==='n') return (adx===2&&ady===1)||(adx===1&&ady===2);
    if (t==='k') return adx<=1&&ady<=1;
    function slideClear(sx,sy){ let cx=fx+sx,cy=fy+sy,steps=Math.max(adx,ady); for(let i=1;i<steps;i++){ if(bs[cy][cx]) return false; cx+=sx; cy+=sy; } return true; }
    if (t==='r') { if(dx!==0&&dy!==0) return false; return slideClear(dx===0?0:dx>0?1:-1,dy===0?0:dy>0?1:-1); }
    if (t==='b') { if(adx!==ady) return false; return slideClear(dx>0?1:-1,dy>0?1:-1); }
    if (t==='q') {
      if(dx===0||dy===0) return slideClear(dx===0?0:dx>0?1:-1,dy===0?0:dy>0?1:-1);
      if(adx===ady) return slideClear(dx>0?1:-1,dy>0?1:-1);
    }
    return false;
  }

  function getAllMoves(bs) {
    let moves=[];
    for(let y=0;y<8;y++) for(let x=0;x<8;x++){
      const p=bs[y][x]; if(!p) continue;
      for(let ty=0;ty<8;ty++) for(let tx=0;tx<8;tx++){
        if(x===tx&&y===ty) continue;
        if(isValidPieceMove(p,x,y,tx,ty,bs)) moves.push({from:{x,y},to:{x:tx,y:ty},piece:p,captured:bs[ty][tx]||null});
      }
    }
    return moves;
  }

  function handlePromotion(piece,toY) {
    if(piece.toLowerCase()==='p'){ if(piece==='P'&&toY===0) return 'Q'; if(piece==='p'&&toY===7) return 'q'; }
    return piece;
  }

  let animating=false, currentMove=null, animProgress=0;
  const animSpeed=0.042;
  let animRequestId=null, nextMoveTimeout=null;
  let movingPieceData=null, tempBoard=null;

  function finishAnimation() {
    if(!currentMove) return;
    const m=currentMove;
    board[m.to.y][m.to.x]=handlePromotion(m.piece,m.to.y);
    board[m.from.y][m.from.x]=null;
    animating=false; movingPieceData=null; tempBoard=null; currentMove=null; animProgress=0;
    if(nextMoveTimeout) clearTimeout(nextMoveTimeout);
    nextMoveTimeout=setTimeout(()=>{ if(!animating) pickAndExecuteRandomMove(); }, 2100);
  }

  function startAnimation(move) {
    if(animating||!move) return false;
    currentMove=move; animProgress=0; animating=true;
    tempBoard=board.map(r=>[...r]);
    tempBoard[move.from.y][move.from.x]=null;
    tempBoard[move.to.y][move.to.x]=null;
    movingPieceData={piece:move.piece,startX:move.from.x,startY:move.from.y,targetX:move.to.x,targetY:move.to.y};
    if(animRequestId===null) animRequestId=requestAnimationFrame(drawLoop);
    return true;
  }

  function pickAndExecuteRandomMove() {
    if(animating) return;
    const moves=getAllMoves(board);
    if(moves.length===0){ initBoard(); setTimeout(pickAndExecuteRandomMove,1000); return; }
    startAnimation(moves[Math.floor(Math.random()*moves.length)]);
  }

  const UNICODE = {
    'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
    'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'
  };

  function drawPiece(pieceCode, cx, cy, size) {
    const white = isWhite(pieceCode);
    const symbol = UNICODE[pieceCode] || '?';
    const fontSize = Math.round(size * 0.74);
    ctx.save();
    ctx.font = `${fontSize}px "Segoe UI Symbol", "Apple Color Emoji", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillText(symbol, cx+2.5, cy+3.5);
    const off = white ? 1.8 : 1.6;
    ctx.fillStyle = white ? '#2a1400' : '#B8860B';
    [[-off,-off],[off,-off],[-off,off],[off,off],[0,-off],[0,off],[-off,0],[off,0]].forEach(([dx,dy])=>{
      ctx.fillText(symbol, cx+dx, cy+dy);
    });
    ctx.fillStyle = white ? '#FFFFF0' : '#0D1433';
    ctx.fillText(symbol, cx, cy);
    ctx.restore();
  }

  function drawChessboardGrass() {
    /* wooden outer frame */
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.roundRect(offsetX-14, offsetY-14, boardSize+28, boardSize+28, 5);
    ctx.fill();
    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 3; ctx.stroke();

    ctx.strokeStyle = '#f5f5f5'; ctx.lineWidth = 2;
    ctx.strokeRect(offsetX-5, offsetY-5, boardSize+10, boardSize+10);

    /* grass squares */
    for (let row=0; row<8; row++) {
      for (let col=0; col<8; col++) {
        const light = (row+col)%2===0;
        const x=offsetX+col*cellSize, y=offsetY+row*cellSize;
        ctx.fillStyle = light ? grassLight : grassDark;
        ctx.fillRect(x, y, cellSize, cellSize);
      }
    }

    /* grid lines */
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.67)'; ctx.lineWidth = 0.8;
    for (let i=0; i<=8; i++) {
      ctx.beginPath(); ctx.moveTo(offsetX+i*cellSize, offsetY); ctx.lineTo(offsetX+i*cellSize, offsetY+boardSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(offsetX, offsetY+i*cellSize); ctx.lineTo(offsetX+boardSize, offsetY+i*cellSize); ctx.stroke();
    }
    ctx.restore();

    /* file labels (a–h) above */
    ctx.save();
    ctx.fillStyle='#f5f5f5'; ctx.font='bold 13px monospace';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ['a','b','c','d','e','f','g','h'].forEach((l,i)=>{
      ctx.fillText(l, offsetX+i*cellSize+cellSize/2, offsetY-6);
    });
    ctx.restore();

    /* rank labels left (8→1) */
    ctx.save();
    ctx.fillStyle='#f5f5f5'; ctx.font='bold 13px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(let i=0;i<8;i++) ctx.fillText(8-i, offsetX-16, offsetY+i*cellSize+cellSize/2);
    ctx.restore();

    /* ── bottom rank numbers 1–8 ── fully inside canvas */
    const labelY = offsetY + boardSize + 16; // sits 16px below the board bottom edge
    ctx.save();
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let col=0; col<8; col++) {
      const rankNum = col + 1;
      const cx = offsetX + col * cellSize + cellSize / 2;
      /* pill background */
      ctx.fillStyle = 'rgba(0,0,0,0.50)';
      ctx.beginPath();
      ctx.roundRect(cx - 11, labelY - 9, 22, 18, 4);
      ctx.fill();
      ctx.fillStyle = '#FFD966';
      ctx.fillText(rankNum, cx, labelY);
    }
    ctx.restore();

    /* corner penalty spots */
    [[0,0],[7,0],[0,7],[7,7]].forEach(([col,row])=>{
      ctx.beginPath();
      ctx.arc(offsetX+col*cellSize+cellSize/2, offsetY+row*cellSize+cellSize/2, 5, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill();
    });

    /* centre spot */
    const mX=offsetX+boardSize/2, mY=offsetY+boardSize/2;
    ctx.beginPath(); ctx.arc(mX, mY, 4, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill();
  }

  function drawFullScene() {
    ctx.fillStyle='#0e2818';
    ctx.fillRect(0,0,1366,768);

    drawChessboardGrass();

    const brd = (animating && tempBoard) ? tempBoard : board;
    for (let row=0; row<8; row++) {
      for (let col=0; col<8; col++) {
        const piece=brd[row][col]; if(!piece) continue;
        if (animating && movingPieceData) {
          if (row===movingPieceData.startY && col===movingPieceData.startX) continue;
          if (row===movingPieceData.targetY && col===movingPieceData.targetX) continue;
        }
        drawPiece(piece, offsetX+col*cellSize+cellSize/2, offsetY+row*cellSize+cellSize/2, cellSize);
      }
    }

    if (animating && movingPieceData) {
      const {piece,startX,startY,targetX,targetY}=movingPieceData;
      const sx=offsetX+startX*cellSize+cellSize/2, sy=offsetY+startY*cellSize+cellSize/2;
      const tx=offsetX+targetX*cellSize+cellSize/2, ty=offsetY+targetY*cellSize+cellSize/2;
      const ease=Math.sin(animProgress*Math.PI/2);
      const currX=sx+(tx-sx)*ease, currY=sy+(ty-sy)*ease;
      ctx.save();
      ctx.beginPath(); ctx.arc(currX, currY+cellSize*0.06, cellSize*0.4, 0, Math.PI*2);
      ctx.strokeStyle='rgba(255,215,50,0.55)'; ctx.lineWidth=7; ctx.stroke();
      drawPiece(piece, currX, currY, cellSize);
      ctx.restore();
    }
  }

  function drawLoop() {
    if (animating && currentMove) {
      animProgress += animSpeed;
      if (animProgress >= 1.0) {
        animProgress=1.0; drawFullScene(); finishAnimation();
        if (animRequestId) cancelAnimationFrame(animRequestId); animRequestId=null;
        drawFullScene(); return;
      }
      drawFullScene();
      animRequestId=requestAnimationFrame(drawLoop);
    } else {
      drawFullScene(); animRequestId=null;
    }
  }

  function start() {
    initBoard(); drawFullScene();
    setTimeout(()=>{ if(!animating) pickAndExecuteRandomMove(); }, 1000);
    setInterval(()=>{ if(!animating&&!currentMove&&!nextMoveTimeout) pickAndExecuteRandomMove(); }, 7500);
  }
  start();
})();
</script>
</body>
</html>
